name: Test AI & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./project-3

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './project-3/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run mocked AI tests (Vitest)
        run: npx --yes vitest run

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

  api-test:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./project-3

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: './project-3/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Test AI Generation Endpoints
        run: |
          echo "Testing API routes..."
          npm run build
        continue-on-error: true
